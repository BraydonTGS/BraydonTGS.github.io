<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --primary: #7a8f7b;
        --secondary: #a3b18a;
        --text: #3a3a3a;
        --muted: #7d7d7d;
    }

    body.dark {
        --bg: #1f2a24;
        --card: #2c3a33;
        --primary: #a3b18a;
        --secondary: #7a8f7b;
        --text: #f1f1f1;
        --muted: #cfcfcf;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 420px;
        text-align: center;
    }

    .top-actions {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 1000;
    }

    .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        border: none;
        cursor: pointer;
        opacity: 0.85;
        backdrop-filter: blur(6px);
    }

    .icon-btn:hover { opacity: 1; }

    h1 { margin-bottom: 10px; }
    p { color: var(--muted); }

    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 23px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    button.main {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button.main:hover { background: var(--secondary); }
    button.main:active { transform: scale(0.97); }

    .results {
        margin-top: 20px;
        text-align: left;
    }

    .result-item {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 4px;
        cursor: pointer;

        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.4s ease forwards;
    }

    .result-item.selected {
        background: var(--primary);
        color: white;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .small {
        font-size: 13px;
        color: var(--muted);
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">🔄</button>
    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
</div>

<div class="container">
    <h1>🌿 Next Feed</h1>
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>

        <div class="small" id="lastFed"></div>
        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function logFeeding() {
    const now = new Date();

    document.getElementById("lastFed").innerText = "Last fed at: " + formatTime(now);
    localStorage.setItem("lastFed", now);

    renderResults(now);
}

function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = parseFloat(localStorage.getItem("defaultInterval"));

    let html = "";

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const isSelected = hour === defaultInterval;

        html += `
        <div class="result-item ${isSelected ? "selected" : ""}" onclick="setDefault(${hour})">
            <span>${hour} hr</span>
            <span>${formatTime(next)}</span>
        </div>`;
    });

    resultsDiv.innerHTML = html;
}

function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);

    const lastFed = localStorage.getItem("lastFed");
    if (lastFed) {
        renderResults(new Date(lastFed));
    }
}

function clearAll() {
    localStorage.removeItem("lastFed");
    document.getElementById("lastFed").innerText = "";
    document.getElementById("results").innerHTML = "";
}

function updateThemeIcon() {
    const isDark = document.body.classList.contains("dark");
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
    updateThemeIcon();
}

function init() {
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const date = new Date(lastFed);
        document.getElementById("lastFed").innerText = "Last fed at: " + formatTime(date);
        renderResults(date);
    }

    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }

    updateThemeIcon();
}

init();
</script>

</body>
</html>
