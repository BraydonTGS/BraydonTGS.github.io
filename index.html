<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Stew</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #020617, #0f172a, #020617, #020617);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  color: #e2e8f0;
  text-align: center;
}

@keyframes gradientShift {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

h1 {
  color: #22c55e;
  text-shadow: 0 0 20px #22c55e;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(2,6,23,0.8);
  border: 1px solid #22c55e33;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 0 30px #22c55e22;
  transition: 0.3s;
}

#time {
  font-size: 70px;
  color: #38bdf8;
  text-shadow: 0 0 25px #38bdf8;
}

button {
  background: none;
  border: 1px solid #38bdf8;
  color: #38bdf8;
  padding: 10px 14px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #38bdf8;
  color: #020617;
  box-shadow: 0 0 10px #38bdf8;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #22c55e55;
  background: #020617;
  color: white;
}

li {
  list-style: none;
  padding: 10px;
  margin-top: 5px;
  background: #020617;
  border-radius: 8px;
  cursor: pointer;
}

.focus * {
  opacity: 0.2;
}

.focus #time {
  opacity: 1;
  transform: scale(1.2);
}

.stats {
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>🧠 BRAIN STEW</h1>
<p style="opacity:0.6;">focus. drift. repeat.</p>

<div class="container">

  <div class="card">
    <div id="time">25:00</div>
    <button onclick="startTimer(); playBeep();">Start</button>
    <button onclick="pauseTimer(); playBeep();">Pause</button>
    <button onclick="resetTimer(); playBeep();">Reset</button>
    <button onclick="toggleFocus(); playBeep();">Focus Mode</button>
  </div>

  <div class="card">
    <input id="taskInput" placeholder="Dump your brain..." />
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>

  <div class="card stats">
    <div>🔥 Streak: <span id="streak">0</span></div>
    <div>✅ Sessions Today: <span id="sessions">0</span></div>
  </div>

</div>
  <script src="js/app.js"></script>
</body>
</html>
