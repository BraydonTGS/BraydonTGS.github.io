<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --primary: #7a8f7b;
    --secondary: #a3b18a;
    --text: #3a3a3a;
    --muted: #7d7d7d;
}

body.dark {
    --bg: #1f2a24;
    --card: #2c3a33;
    --primary: #a3b18a;
    --secondary: #7a8f7b;
    --text: #f1f1f1;
    --muted: #cfcfcf;
}

/* ✅ FIX: remove flex centering (caused floating buttons issue) */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ✅ TRUE fixed buttons */
.top-actions {
    position: fixed;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 1000;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* restore your centered layout feel */
.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    margin: 80px auto 20px;
}

h1 { margin-bottom: 10px; }
p { color: var(--muted); }

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

button.main {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button.main:hover { background: var(--secondary); }
button.main:active { transform: scale(0.97); }

/* slightly tighter but same feel */
.results {
    margin-top: 16px;
    text-align: left;
}

.result-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
}

.result-item.selected {
    background: var(--primary);
    color: white;
}

.small {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
}

.countdown {
    margin-top: 6px;
    font-size: 14px;
}

.status {
    font-size: 12px;
    margin-top: 4px;
    color: var(--muted);
}
</style>
</head>
<body>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">🔄</button>
    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
</div>

<div class="container">
    <h1>🌿 Next Feed</h1>
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>

        <div class="small" id="lastFed"></div>
        <div class="countdown" id="countdown"></div>
        <div class="status" id="notifStatus"></div>

        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];
let countdownTimer;

function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit',
        hour12: undefined
    });
}

function logFeeding() {
    const now = new Date();
    localStorage.setItem("lastFed", now);

    document.getElementById("lastFed").innerText =
        "Last fed at: " + formatTime(now);

    renderResults(now);
    scheduleNotification(now);
    startCountdown();
}

function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = parseFloat(localStorage.getItem("defaultInterval"));

    resultsDiv.innerHTML = "";

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const div = document.createElement("div");

        div.className = "result-item";
        if (hour === defaultInterval) div.classList.add("selected");

        div.innerHTML = `
            <span>${hour} hr</span>
            <span>${formatTime(next)}</span>
        `;

        div.onclick = () => setDefault(hour);

        resultsDiv.appendChild(div);
    });
}

function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);

    const lastFed = localStorage.getItem("lastFed");
    if (lastFed) {
        renderResults(new Date(lastFed));
        scheduleNotification(new Date(lastFed));
        startCountdown();
    }
}

function startCountdown() {
    clearInterval(countdownTimer);

    countdownTimer = setInterval(() => {
        const lastFed = localStorage.getItem("lastFed");
        const interval = parseFloat(localStorage.getItem("defaultInterval"));

        if (!lastFed || !interval) return;

        const next = new Date(new Date(lastFed).getTime() + interval * 3600000);
        const diff = next - new Date();

        if (diff <= 0) {
            document.getElementById("countdown").innerText = "Time to feed";
            return;
        }

        const mins = Math.floor(diff / 60000);
        document.getElementById("countdown").innerText =
            `Next in ${mins} min`;
    }, 60000);
}

function updateNotifStatus() {
    const status = document.getElementById("notifStatus");

    if (Notification.permission === "granted") {
        status.innerText = "🔔 Notifications on";
    } else if (Notification.permission === "denied") {
        status.innerText = "🔕 Notifications blocked";
    } else {
        status.innerText = "🔕 Notifications off";
    }
}

function scheduleNotification(baseTime) {
    const interval = parseFloat(localStorage.getItem("defaultInterval"));
    if (!interval) return;

    if (Notification.permission !== "granted") {
        Notification.requestPermission().then(updateNotifStatus);
        return;
    }

    updateNotifStatus();

    const delay = interval * 3600000;

    setTimeout(() => {
        new Notification("🌿 Time to feed");
    }, delay);
}

function clearAll() {
    localStorage.removeItem("lastFed"); // ✅ keep default

    document.getElementById("lastFed").innerText = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("countdown").innerText = "";

    clearInterval(countdownTimer);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
}

function init() {
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const date = new Date(lastFed);
        document.getElementById("lastFed").innerText =
            "Last fed at: " + formatTime(date);

        renderResults(date);
        startCountdown();
    }

    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }

    document.getElementById("themeBtn").innerText =
        document.body.classList.contains("dark") ? "☀️" : "🌙";

    updateNotifStatus();
}

init();
</script>

</body>
</html>
