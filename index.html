<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --primary: #7a8f7b;
    --secondary: #a3b18a;
    --text: #3a3a3a;
    --muted: #7d7d7d;
}

body.dark {
    --bg: #1f2a24;
    --card: #2c3a33;
    --primary: #a3b18a;
    --secondary: #7a8f7b;
    --text: #f1f1f1;
    --muted: #cfcfcf;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.top-actions {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 9999;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
}

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
}

button.main {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
}

.results {
    margin-top: 20px;
    text-align: left;
}

.result-item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    border: 1px solid transparent;
}

.result-item:hover {
    border-color: var(--secondary);
}

.result-item.selected {
    background: var(--primary);
    color: white;
}

.small {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
}

.countdown {
    margin-top: 8px;
    font-size: 14px;
}

.hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
}
</style>
</head>
<body>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">🔄</button>
    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
</div>

<div class="container">
    <h1>🌿 Next Feed</h1>
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>

        <div class="small" id="lastFed"></div>
        <div class="countdown" id="countdown"></div>
        <div class="hint">Tap a row to set default</div>

        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];
let countdownTimer;

function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit',
        hour12: undefined
    });
}

function logFeeding() {
    const now = new Date();
    localStorage.setItem("lastFed", now);

    document.getElementById("lastFed").innerText =
        "Last fed at: " + formatTime(now);

    renderResults(now);
    scheduleNotification(now);
    startCountdown();
}

function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = parseFloat(localStorage.getItem("defaultInterval"));

    resultsDiv.innerHTML = "";

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const div = document.createElement("div");

        div.className = "result-item";
        if (hour === defaultInterval) div.classList.add("selected");

        div.innerHTML = `
            <span>${hour} hr</span>
            <span>${formatTime(next)}</span>
        `;

        div.onclick = () => setDefault(hour);

        resultsDiv.appendChild(div);
    });

    const selected = document.querySelector(".selected");
    if (selected) {
        selected.scrollIntoView({ behavior: "smooth", block: "center" });
    }
}

function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);

    const lastFed = localStorage.getItem("lastFed");
    if (lastFed) {
        renderResults(new Date(lastFed));
        scheduleNotification(new Date(lastFed));
        startCountdown();
    }
}

function startCountdown() {
    clearInterval(countdownTimer);

    countdownTimer = setInterval(() => {
        const lastFed = localStorage.getItem("lastFed");
        const interval = parseFloat(localStorage.getItem("defaultInterval"));

        if (!lastFed || !interval) return;

        const next = new Date(new Date(lastFed).getTime() + interval * 3600000);
        const diff = next - new Date();

        if (diff <= 0) {
            document.getElementById("countdown").innerText = "Time to feed";
            return;
        }

        const mins = Math.floor(diff / 60000);
        document.getElementById("countdown").innerText =
            `Next in ${mins} min`;
    }, 60000);
}

function scheduleNotification(baseTime) {
    const interval = parseFloat(localStorage.getItem("defaultInterval"));
    if (!interval) return;

    if (Notification.permission !== "granted") {
        Notification.requestPermission();
        return;
    }

    const delay = interval * 3600000;

    setTimeout(() => {
        new Notification("🌿 Time to feed");
    }, delay);
}

function clearAll() {
    localStorage.removeItem("lastFed");
    localStorage.removeItem("defaultInterval");

    document.getElementById("lastFed").innerText = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("countdown").innerText = "";

    clearInterval(countdownTimer);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
}

function init() {
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const date = new Date(lastFed);
        document.getElementById("lastFed").innerText =
            "Last fed at: " + formatTime(date);

        renderResults(date);
        startCountdown();
    }

    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }

    document.getElementById("themeBtn").innerText =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
}

init();
</script>

</body>
</html>
