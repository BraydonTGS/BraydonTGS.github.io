<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Slab</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #020617, #000);
  color: #0ff;
}

/* HEADER */
h1 {
  text-align: center;
  margin: 20px 0 10px;
  font-size: 2.2em;
  text-shadow: 0 0 15px #0ff;
}

/* SEARCH */
.search-container {
  padding: 0 15px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 1.1em;
  border-radius: 12px;
  border: 2px solid #0ff;
  background: #020617;
  color: #0ff;
  box-shadow: 0 0 12px #0ff;
}

/* SUMMARY */
.summary {
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #22c55e;
  box-shadow: 0 0 10px #22c55e;
  display: flex;
  justify-content: space-around;
  text-align: center;
  font-size: 0.9em;
}

/* GRID */
.results {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #020617, #020617);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #0ff;
  box-shadow: 0 0 10px #0ff;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #0ff;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

/* CONTENT */
.card-body {
  padding: 10px;
}

.title {
  font-size: 0.8em;
  margin-bottom: 6px;
  color: #38bdf8;
}

.price {
  font-size: 1.1em;
  font-weight: bold;
  color: #22c55e;
}

/* MOBILE IMPROVEMENTS */
@media (max-width: 500px) {
  .card img {
    height: 120px;
  }

  .title {
    font-size: 0.75em;
  }

  .price {
    font-size: 1em;
  }
}
</style>
</head>

<body>

<h1>Neon Slab 🔮</h1>

<div class="search-container">
  <input id="searchInput" placeholder="Search cards (e.g. 'Jordan PSA 10')" />
</div>

<div id="summary"></div>
<div class="results" id="results"></div>

<script>
const data = [
  { name: "Michael Jordan 1986 Fleer PSA 9", price: 15200, img: "https://picsum.photos/300/200?random=1" },
  { name: "LeBron James Rookie PSA 10", price: 2500, img: "https://picsum.photos/300/200?random=2" },
  { name: "Tom Brady Rookie PSA 10", price: 4200, img: "https://picsum.photos/300/200?random=3" },
  { name: "Kobe Bryant Topps Rookie PSA 10", price: 3300, img: "https://picsum.photos/300/200?random=4" },
  { name: "Shohei Ohtani Rookie Auto", price: 1800, img: "https://picsum.photos/300/200?random=5" },
  { name: "Patrick Mahomes Rookie Patch Auto", price: 5500, img: "https://picsum.photos/300/200?random=6" }
];

const input = document.getElementById("searchInput");
const resultsEl = document.getElementById("results");
const summaryEl = document.getElementById("summary");

// Initial empty state
resultsEl.innerHTML = "<p style='opacity:0.6;text-align:center;margin-top:40px;'>Search for a slab to begin...</p>";

input.addEventListener("input", () => {
  const query = input.value.toLowerCase().trim();

  // If empty → reset to nothing
  if (!query) {
    resultsEl.innerHTML = "<p style='opacity:0.6;text-align:center;margin-top:40px;'>Search for a slab to begin...</p>";
    summaryEl.innerHTML = "";
    return;
  }

  const filtered = data.filter(card =>
    card.name.toLowerCase().includes(query)
  );

  render(filtered);
});

function render(cards) {
  resultsEl.innerHTML = "";
  summaryEl.innerHTML = "";

  if (cards.length === 0) {
    resultsEl.innerHTML = "<p style='text-align:center;'>No slabs found...</p>";
    return;
  }

  // 📊 summary
  const prices = cards.map(c => c.price).sort((a,b)=>a-b);
  const avg = (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(0);
  const median = prices.length % 2
    ? prices[Math.floor(prices.length/2)]
    : ((prices[prices.length/2-1]+prices[prices.length/2])/2).toFixed(0);

  summaryEl.innerHTML = `
    <div class="summary">
      <div>
        <div>AVG</div>
        <div>$${avg}</div>
      </div>
      <div>
        <div>MEDIAN</div>
        <div>$${median}</div>
      </div>
      <div>
        <div>SALES</div>
        <div>${cards.length}</div>
      </div>
    </div>
  `;

  // 🃏 cards
  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${card.img}" />
      <div class="card-body">
        <div class="title">${card.name}</div>
        <div class="price">$${card.price.toLocaleString()}</div>
      </div>
    `;

    resultsEl.appendChild(div);
  });
}
</script>

</body>
</html>
