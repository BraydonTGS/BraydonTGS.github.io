<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a8f7b">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --primary: #7a8f7b;
    --secondary: #a3b18a;
    --text: #3a3a3a;
    --muted: #7d7d7d;
}

body.dark {
    --bg: #1f2a24;
    --card: #2c3a33;
    --primary: #a3b18a;
    --secondary: #7a8f7b;
    --text: #f1f1f1;
    --muted: #cfcfcf;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.top-title {
    position: fixed;
    top: 12px;
    left: 16px;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 24px;
    font-weight: 600;
    z-index: 1000;
}

.top-actions {
    position: fixed;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 1000;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.icon-btn i {
    width: 20px;
    height: 20px;
}

/* TREE ICON */
.title-icon {
    width: 22px;
    height: 22px;
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    margin: 80px auto 20px;
}

p {
    color: var(--muted);
    font-weight: 500;
}

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

button.main {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button.main:hover { background: var(--secondary); }
button.main:active { transform: scale(0.97); }

.results {
    margin-top: 16px;
    text-align: left;
}

.result-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
}

.result-item.selected {
    background: var(--primary);
    color: white;
}

.timer {
    margin-top: 16px;
    font-size: 20px;
    font-weight: 600;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(122,143,123, 0.4); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(122,143,123, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(122,143,123, 0); }
}

.timer.done {
    color: var(--primary);
    animation: pulse 1.5s infinite;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-title">
    <!-- your SVG icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/>
        <path d="M7 16v6"/>
        <path d="M13 19v3"/>
        <path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/>
    </svg>

    Next Feed
</div>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">
        <i data-lucide="rotate-ccw"></i>
    </button>

    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn"></button>
</div>

<div class="container">
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>
        <div class="timer" id="countdown">--:--:--</div>
        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];
let countdownInterval;

function getDefaultInterval() {
    return parseFloat(localStorage.getItem("defaultInterval")) || 1;
}

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function formatCountdown(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
    const s = String(totalSeconds % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
}

function logFeeding() {
    const now = new Date();
    localStorage.setItem("lastFed", now);

    renderResults(now);
    startCountdown(now);
}

function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = getDefaultInterval();

    resultsDiv.innerHTML = "";

    const nowDiv = document.createElement("div");
    nowDiv.className = "result-item";
    nowDiv.innerHTML = `<span>Last Fed</span><span>${formatTime(baseTime)}</span>`;
    resultsDiv.appendChild(nowDiv);

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const div = document.createElement("div");

        div.className = "result-item";
        if (hour === defaultInterval) div.classList.add("selected");

        div.innerHTML = `<span>${hour} hr</span><span>${formatTime(next)}</span>`;
        div.onclick = () => setDefault(hour);

        resultsDiv.appendChild(div);
    });
}

function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const base = new Date(lastFed);
        renderResults(base);
        startCountdown(base);
    }
}

/* FIXED DARK MODE (no icon bugs) */
function toggleDarkMode() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", isDark);
    updateThemeIcon(isDark);
}

function updateThemeIcon(isDark) {
    const btn = document.getElementById("themeBtn");

    btn.innerHTML = isDark
        ? `<i data-lucide="sun"></i>`
        : `<i data-lucide="moon"></i>`;

    lucide.createIcons();
}

function startCountdown(baseTime) {
    clearInterval(countdownInterval);

    const intervalHours = getDefaultInterval();
    const targetTime = new Date(baseTime.getTime() + intervalHours * 3600000);
    const timerEl = document.getElementById("countdown");

    function update() {
        const now = new Date();
        const diff = targetTime - now;

        if (diff <= 0) {
            timerEl.innerText = "Time to feed!";
            timerEl.classList.add("done");
            return;
        }

        timerEl.classList.remove("done");
        timerEl.innerText = formatCountdown(diff);
    }

    update();
    countdownInterval = setInterval(update, 1000);
}

function clearAll() {
    localStorage.removeItem("lastFed");
    document.getElementById("results").innerHTML = "";

    const timerEl = document.getElementById("countdown");
    timerEl.innerText = "--:--:--";
    timerEl.classList.remove("done");
    clearInterval(countdownInterval);
}

function init() {
    const isDark = localStorage.getItem("darkMode") === "true";

    if (isDark) document.body.classList.add("dark");

    updateThemeIcon(isDark);

    lucide.createIcons();

    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const base = new Date(lastFed);
        renderResults(base);
        startCountdown(base);
    }
}

init();
</script>

</body>
</html>
