<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a8f7b">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --primary: #7a8f7b;
    --secondary: #a3b18a;
    --text: #3a3a3a;
    --muted: #7d7d7d;
}

body.dark {
    --bg: #1f2a24;
    --card: #2c3a33;
    --primary: #a3b18a;
    --secondary: #7a8f7b;
    --text: #f1f1f1;
    --muted: #cfcfcf;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.top-title {
    position: fixed;
    top: 12px;
    left: 16px;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 24px;
    font-weight: 600;
    z-index: 1000;
}

.top-actions {
    position: fixed;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 1000;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.icon-btn i {
    width: 20px;
    height: 20px;
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    margin: 80px auto 0;
    min-height: calc(100vh - 100px);
}

p {
    color: var(--muted);
    font-weight: 500;
}

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    min-height: 70vh;
    display: flex;
    flex-direction: column;
}

button.main {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button.main:hover { background: var(--secondary); }
button.main:active { transform: scale(0.97); }

.timer {
    margin-top: 16px;
    font-size: 20px;
    font-weight: 600;
}

.timer.warn { color: #e6c200; }
.timer.danger { color: #ff4d4d; }

.results {
    margin-top: 16px;
    text-align: left;
    flex: 1;
    overflow-y: auto;
}

.result-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
}

.result-item.selected {
    background: var(--primary);
    color: white;
}
</style>
</head>

<body>

<div class="top-title">
    Next Feed
</div>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">
        <i data-lucide="rotate-ccw"></i>
    </button>

    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn"></button>
</div>

<div class="container">
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>
        <div class="timer" id="countdown">--:--:--</div>
        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];
let countdownInterval;

function getDefaultInterval() {
    return parseFloat(localStorage.getItem("defaultInterval")) || 1;
}

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function formatCountdown(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
    const s = String(totalSeconds % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
}

/* 🔔 Notification helper */
function notify(msg) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Next Feed", { body: msg });
    }
}

function logFeeding() {
    const now = new Date();
    localStorage.setItem("lastFed", now);

    renderResults(now);
    startCountdown(now);
}

function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = getDefaultInterval();

    resultsDiv.innerHTML = "";

    const nowDiv = document.createElement("div");
    nowDiv.className = "result-item";
    nowDiv.innerHTML = `<span>Last Fed</span><span>${formatTime(baseTime)}</span>`;
    resultsDiv.appendChild(nowDiv);

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const div = document.createElement("div");

        div.className = "result-item";
        if (hour === defaultInterval) div.classList.add("selected");

        div.innerHTML = `<span>${hour} hr</span><span>${formatTime(next)}</span>`;
        div.onclick = () => setDefault(hour);

        resultsDiv.appendChild(div);
    });
}

function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const base = new Date(lastFed);
        renderResults(base);
        startCountdown(base);
    }
}

/* 🔥 MAIN TIMER + NOTIFICATIONS */
function startCountdown(baseTime) {
    clearInterval(countdownInterval);

    const intervalHours = getDefaultInterval();
    const targetTime = new Date(baseTime.getTime() + intervalHours * 3600000);

    const timerEl = document.getElementById("countdown");

    let fired = {
        30: false,
        15: false,
        10: false,
        5: false
    };

    function update() {
        const now = new Date();
        const diff = targetTime - now;
        const minutes = Math.floor(diff / 60000);

        // 🔔 alerts
        if (minutes <= 30 && !fired[30]) { notify("30 minutes remaining"); fired[30] = true; }
        if (minutes <= 15 && !fired[15]) { notify("15 minutes remaining"); fired[15] = true; }
        if (minutes <= 10 && !fired[10]) { notify("10 minutes remaining"); fired[10] = true; }
        if (minutes <= 5 && !fired[5]) { notify("5 minutes remaining"); fired[5] = true; }

        // UI states
        timerEl.classList.remove("warn", "danger");

        if (minutes <= 10) timerEl.classList.add("danger");
        else if (minutes <= 30) timerEl.classList.add("warn");

        if (diff <= 0) {
            timerEl.innerText = "Time to feed!";
            return;
        }

        timerEl.innerText = formatCountdown(diff);
    }

    update();
    countdownInterval = setInterval(update, 1000);
}

function clearAll() {
    localStorage.removeItem("lastFed");
    document.getElementById("results").innerHTML = "";
    document.getElementById("countdown").innerText = "--:--:--";
    clearInterval(countdownInterval);
}

function toggleDarkMode() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", isDark);
    updateThemeIcon(isDark);
}

function updateThemeIcon(isDark) {
    const btn = document.getElementById("themeBtn");
    btn.innerHTML = `<i data-lucide="${isDark ? "sun" : "moon"}"></i>`;
    lucide.createIcons();
}

function init() {
    const isDark = localStorage.getItem("darkMode") === "true";
    if (isDark) document.body.classList.add("dark");

    updateThemeIcon(isDark);
    lucide.createIcons();

    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        const base = new Date(lastFed);
        renderResults(base);
        startCountdown(base);
    }

    // 🔔 request permission
    if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
    }
}

init();
</script>

</body>
</html>
