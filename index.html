<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lil' Dougouts</title>
<style>
  body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #22c55e;
    text-align: center;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 20px;
  }
  h1 {
    font-size: 3em;
    color: #38bdf8;
    text-shadow: 0 0 15px #38bdf8;
  }
  .game-board {
    background: rgba(2,6,23,0.8);
    border: 2px solid #38bdf8;
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    width: 320px;
    box-shadow: 0 0 20px #38bdf8;
  }
  button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid #38bdf8;
    background: none;
    color: #38bdf8;
    font-weight: bold;
    cursor: pointer;
    font-size: 1em;
    transition: 0.2s;
  }
  button:hover {
    background: #38bdf8;
    color: #020617;
    box-shadow: 0 0 10px #38bdf8;
  }
  .log {
    margin-top: 15px;
    text-align: left;
    height: 150px;
    overflow-y: auto;
    border-top: 1px solid #38bdf8;
    padding-top: 10px;
  }
</style>
</head>
<body>

<h1>Lil' Dougouts ⚾</h1>
<div class="game-board">
  <div>Score: <span id="score">0</span></div>
  <div>Inning: <span id="inning">1</span></div>
  <div>Outs: <span id="outs">0</span></div>
  <div>Bases: <span id="bases">---</span></div>
  <button id="swingButton">Swing Bat!</button>
  <div class="log" id="log"></div>
</div>

<script>
let score = 0;
let inning = 1;
let outs = 0;
let bases = [false, false, false]; // first, second, third
const logEl = document.getElementById("log");

function updateDisplay() {
  document.getElementById("score").innerText = score;
  document.getElementById("inning").innerText = inning;
  document.getElementById("outs").innerText = outs;
  document.getElementById("bases").innerText = bases.map(b => b ? '⚾' : '-').join('');
}

function addLog(text) {
  const entry = document.createElement("div");
  entry.innerText = text;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function advanceRunners(hits) {
  // Simple logic: move runners by "hits" bases
  for (let i = 2; i >= 0; i--) {
    if (bases[i]) {
      if (i + hits >= 3) {
        score++;
        bases[i] = false;
        addLog("Runner scores!");
      } else {
        bases[i + hits] = true;
        bases[i] = false;
      }
    }
  }
  if (hits === 4) { // Home run
    score++;
    addLog("Home run!");
  } else if (hits > 0) {
    bases[hits - 1] = true;
  }
}

function swingBat() {
  const r = Math.random();
  if (r < 0.15) {
    outs++;
    addLog("Strike! Out count increases.");
  } else if (r < 0.25) {
    addLog("Pop fly! Out recorded.");
    outs++;
  } else if (r < 0.50) {
    addLog("Single!");
    advanceRunners(1);
  } else if (r < 0.70) {
    addLog("Double!");
    advanceRunners(2);
  } else if (r < 0.85) {
    addLog("Triple!");
    advanceRunners(3);
  } else {
    addLog("Home run!");
    advanceRunners(4);
  }

  if (outs >= 3) {
    addLog("3 Outs! Next Inning.");
    inning++;
    outs = 0;
    bases = [false, false, false];
  }

  updateDisplay();
}

// Init
document.getElementById("swingButton").addEventListener("click", swingBat);
updateDisplay();
addLog("Welcome to Lil' Dougouts! Click 'Swing Bat!' to play.");
</script>

</body>
</html>
