<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --primary: #7a8f7b;
        --secondary: #a3b18a;
        --text: #3a3a3a;
        --muted: #7d7d7d;
    }

    body.dark {
        --bg: #1f2a24;
        --card: #2c3a33;
        --primary: #a3b18a;
        --secondary: #7a8f7b;
        --text: #f1f1f1;
        --muted: #cfcfcf;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 420px;
        text-align: center;
        position: relative;
    }

    h1 { margin-bottom: 10px; }
    p { color: var(--muted); }

    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    button {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover { background: var(--secondary); }

    .icon-btn {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        padding: 0;
        z-index: 10;
    }

    .results {
        margin-top: 20px;
        text-align: left;
    }

    .result-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.4s ease forwards;
    }

    .result-item:nth-child(1) { animation-delay: 0.05s; }
    .result-item:nth-child(2) { animation-delay: 0.1s; }
    .result-item:nth-child(3) { animation-delay: 0.15s; }
    .result-item:nth-child(4) { animation-delay: 0.2s; }
    .result-item:nth-child(5) { animation-delay: 0.25s; }
    .result-item:nth-child(6) { animation-delay: 0.3s; }
    .result-item:nth-child(7) { animation-delay: 0.35s; }
    .result-item:nth-child(8) { animation-delay: 0.4s; }
    .result-item:nth-child(9) { animation-delay: 0.45s; }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .small { font-size: 13px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
    
<button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
    
<div class="container">
    <h1>Next Feed 🌿</h1>
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button onclick="logFeeding()">Log Feeding</button>

        <div class="small" id="lastFed"></div>

        <div class="results" id="results"></div>
    </div>
</div>

<script>
function formatTime(date) {
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function logFeeding() {
    const now = new Date();

    document.getElementById("lastFed").innerText = "Last fed at: " + formatTime(now);
    localStorage.setItem("lastFed", now);

    const resultsDiv = document.getElementById("results");

    const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];

    let html = "";

    intervals.forEach(hour => {
        const next = new Date(now.getTime() + hour * 3600000);
        html += `<div class="result-item"><span>${hour} hr</span><span>${formatTime(next)}</span></div>`;
    });

    resultsDiv.innerHTML = html;
}

function updateThemeIcon() {
    const isDark = document.body.classList.contains("dark");
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
    updateThemeIcon();
}

function init() {
    const lastFed = localStorage.getItem("lastFed");
    if (lastFed) {
        document.getElementById("lastFed").innerText = "Last fed at: " + formatTime(new Date(lastFed));
    }

    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }

    updateThemeIcon();
}

init();
</script>

</body>
</html>
