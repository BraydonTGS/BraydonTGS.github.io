<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Slab</title>

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: radial-gradient(circle at top, #020617, #000);
  color: #0ff;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-size: 3em;
  text-shadow: 0 0 20px #0ff;
}

.search-container {
  margin: 30px auto;
  width: 90%;
  max-width: 500px;
}

input {
  width: 100%;
  padding: 15px;
  font-size: 1.2em;
  border-radius: 10px;
  border: 2px solid #0ff;
  background: #020617;
  color: #0ff;
  box-shadow: 0 0 10px #0ff;
}

.results {
  margin-top: 30px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(2,6,23,0.9);
  border: 1px solid #0ff;
  border-radius: 12px;
  padding: 15px;
  width: 250px;
  text-align: left;
  box-shadow: 0 0 15px #0ff;
}

.card img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 10px;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

.loader {
  margin-top: 20px;
}

.grid {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(#0ff1 1px, transparent 1px),
                    linear-gradient(90deg, #0ff1 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
  animation: moveGrid 10s linear infinite;
}

@keyframes moveGrid {
  from { transform: translateY(0); }
  to { transform: translateY(40px); }
}
</style>
</head>

<body>

<div class="grid"></div>

<h1>Neon Slab 🔮</h1>

<div class="search-container">
  <input id="searchInput" placeholder="Search cards (e.g. 'Jordan rookie PSA')" />
</div>

<div class="loader" id="loader"></div>
<div class="results" id="results"></div>
<script>
const input = document.getElementById("searchInput");
const resultsEl = document.getElementById("results");
const loader = document.getElementById("loader");

const PROXY = "https://api.allorigins.win/raw?url=";

input.addEventListener("keypress", async (e) => {
  if (e.key === "Enter") {
    searchCards(input.value);
  }
});

async function searchCards(query) {
  resultsEl.innerHTML = "";
  loader.innerText = "Scanning the marketplace...";

  const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}&_sacat=0&LH_Sold=1&LH_Complete=1`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(ebayUrl));
    const html = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const items = doc.querySelectorAll(".s-item");

    let prices = [];
    let cards = [];

    items.forEach((item) => {
      const title = item.querySelector(".s-item__title")?.innerText;
      const priceText = item.querySelector(".s-item__price")?.innerText;
      const img = item.querySelector(".s-item__image-img")?.src;

      if (!title || !priceText) return;

      // Remove junk listings
      if (title.toLowerCase().includes("lot") || title.toLowerCase().includes("reprint")) return;

      // Extract numeric price
      const priceMatch = priceText.replace(/,/g, "").match(/\d+(\.\d+)?/);
      if (!priceMatch) return;

      const price = parseFloat(priceMatch[0]);

      prices.push(price);

      cards.push({
        title,
        priceText,
        img
      });
    });

    loader.innerText = "";

    if (cards.length === 0) {
      loader.innerText = "No slabs found...";
      return;
    }

    // --- PRICE ANALYTICS ---
    prices.sort((a, b) => a - b);

    const avg = (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2);
    const median = prices.length % 2 !== 0
      ? prices[Math.floor(prices.length / 2)]
      : ((prices[prices.length / 2 - 1] + prices[prices.length / 2]) / 2).toFixed(2);

    const summary = document.createElement("div");
    summary.className = "card";
    summary.style.border = "2px solid #22c55e";
    summary.innerHTML = `
      <div class="card-title">Market Summary</div>
      <div>Avg Price: <span class="price">$${avg}</span></div>
      <div>Median Price: <span class="price">$${median}</span></div>
      <div>Sales Count: ${prices.length}</div>
    `;

    resultsEl.appendChild(summary);

    // --- RENDER CARDS ---
    cards.slice(0, 12).forEach(card => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${card.img}" />
        <div>${card.title}</div>
        <div class="price">${card.priceText}</div>
      `;

      resultsEl.appendChild(div);
    });

  } catch (err) {
    loader.innerText = "Error accessing data stream ⚠️";
    console.error(err);
  }
}
</script>
</body>
</html>
