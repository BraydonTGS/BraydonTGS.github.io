<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Slab</title>

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: radial-gradient(circle at top, #020617, #000);
  color: #0ff;
  text-align: center;
  padding: 10px;
}

/* HEADER */
h1 {
  margin-top: 15px;
  font-size: 2.2em;
  text-shadow: 0 0 15px #0ff;
}

/* SEARCH */
.search-container {
  margin: 20px auto;
  width: 100%;
  max-width: 500px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1em;
  border-radius: 10px;
  border: 2px solid #0ff;
  background: #020617;
  color: #0ff;
  box-shadow: 0 0 8px #0ff;
}

/* RESULTS GRID (key change) */
.results {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  padding: 0 5px;
}

/* CARD */
.card {
  background: rgba(2,6,23,0.9);
  border: 1px solid #0ff;
  border-radius: 12px;
  padding: 10px;
  text-align: left;
  box-shadow: 0 0 10px #0ff;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 18px #0ff;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
}

/* TEXT */
.card div {
  font-size: 0.8em;
}

.price {
  color: #22c55e;
  font-weight: bold;
  font-size: 1em;
  margin-top: 4px;
}

/* LOADER */
.loader {
  margin-top: 15px;
  font-size: 0.9em;
}

/* BACKGROUND GRID */
.grid {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(#0ff1 1px, transparent 1px),
                    linear-gradient(90deg, #0ff1 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
  animation: moveGrid 10s linear infinite;
}

@keyframes moveGrid {
  from { transform: translateY(0); }
  to { transform: translateY(40px); }
}

/* EXTRA MOBILE POLISH */
@media (max-width: 480px) {
  h1 {
    font-size: 1.8em;
  }

  input {
    font-size: 0.95em;
    padding: 10px;
  }

  .card img {
    height: 100px;
  }

  .card div {
    font-size: 0.75em;
  }
}
</style>
</head>

<body>

<div class="grid"></div>

<h1>Neon Slab 🔮</h1>

<div class="search-container">
  <input id="searchInput" placeholder="Search cards (e.g. 'Jordan rookie PSA')" />
</div>

<div class="loader" id="loader"></div>
<div class="results" id="results"></div>
<script>
const input = document.getElementById("searchInput");
const resultsEl = document.getElementById("results");
const loader = document.getElementById("loader");

// 👇 KEEP your proxy (commented out for later use)
// const PROXY = "https://corsproxy.io/?";

input.addEventListener("keypress", async (e) => {
  if (e.key === "Enter") {
    searchCards(input.value);
  }
});

async function searchCards(query) {
  resultsEl.innerHTML = "";
  loader.innerText = "Scanning the marketplace...";

  // =====================================================
  // 🚫 REAL API CALL (COMMENTED OUT FOR NOW)
  // =====================================================
  /*
  const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}&_sacat=0&LH_Sold=1&LH_Complete=1`;

  try {
    const res = await fetch(PROXY + encodeURIComponent(ebayUrl));
    const html = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const items = doc.querySelectorAll(".s-item");
    // parsing logic...
  } catch (err) {
    loader.innerText = "Error accessing data stream ⚠️";
    console.error(err);
  }
  */

  // =====================================================
  // ✅ DUMMY DATA (USED FOR NOW)
  // =====================================================

  const dummyData = [
    {
      title: "Michael Jordan 1986 Fleer PSA 9",
      price: "$15,200",
      img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=400"
    },
    {
      title: "LeBron James Rookie PSA 10",
      price: "$2,500",
      img: "https://images.unsplash.com/photo-1624526267942-ab0ff8a3e972?w=400"
    },
    {
      title: "Kobe Bryant Topps Rookie PSA 10",
      price: "$3,300",
      img: "https://images.unsplash.com/photo-1612874742237-6526221588e3?w=400"
    },
    {
      title: "Tom Brady Rookie PSA 10",
      price: "$4,200",
      img: "https://images.unsplash.com/photo-1606813906975-5b9b3c8a9d55?w=400"
    },
    {
      title: "Shohei Ohtani Rookie Auto",
      price: "$1,800",
      img: "https://images.unsplash.com/photo-1599058917212-d750089bc07e?w=400"
    },
    {
      title: "Patrick Mahomes Rookie Patch Auto",
      price: "$5,500",
      img: "https://images.unsplash.com/photo-1606813906975-5b9b3c8a9d55?w=400"
    }
  ];

  // simulate network delay
  await new Promise(r => setTimeout(r, 400));

  loader.innerText = "";

  // simple filter based on search
  const filtered = dummyData.filter(card =>
    card.title.toLowerCase().includes(query.toLowerCase())
  );

  if (filtered.length === 0) {
    loader.innerText = "No slabs found...";
    return;
  }

  // --- PRICE ANALYTICS ---
  const prices = filtered.map(c =>
    parseFloat(c.price.replace(/[$,]/g, ""))
  );

  prices.sort((a, b) => a - b);

  const avg = (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2);
  const median = prices.length % 2 !== 0
    ? prices[Math.floor(prices.length / 2)]
    : ((prices[prices.length / 2 - 1] + prices[prices.length / 2]) / 2).toFixed(2);

  const summary = document.createElement("div");
  summary.className = "card";
  summary.style.border = "2px solid #22c55e";
  summary.innerHTML = `
    <div style="color:#22c55e;font-weight:bold;margin-bottom:8px;">Market Summary</div>
    <div>Avg: <span class="price">$${avg}</span></div>
    <div>Median: <span class="price">$${median}</span></div>
    <div>Sales: ${prices.length}</div>
  `;

  resultsEl.appendChild(summary);

  // --- RENDER CARDS ---
  filtered.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${card.img}" />
      <div>${card.title}</div>
      <div class="price">${card.price}</div>
    `;

    resultsEl.appendChild(div);
  });
}
</script>
</body>
</html>
