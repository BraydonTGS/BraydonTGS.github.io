<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baby Feeding Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --primary: #7a8f7b;
        --secondary: #a3b18a;
        --text: #3a3a3a;
        --muted: #7d7d7d;
        --shadow: rgba(0,0,0,0.05);
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 420px;
        text-align: center;
    }

    h1 {
        font-weight: 500;
        margin-bottom: 10px;
    }

    p {
        color: var(--muted);
        margin-bottom: 30px;
    }

    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 25px var(--shadow);
    }

    button {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 15px 25px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
    }

    button:hover {
        background: var(--secondary);
    }

    .results {
        margin-top: 25px;
        text-align: left;
    }

    .result-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        font-size: 16px;
    }

    .time {
        font-weight: 500;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
    }
</style>
</head>

<body>

<div class="container">
    <h1>🌿 Feeding Tracker</h1>
    <p>Tap below after a feeding to see upcoming times</p>

    <div class="card">
        <button onclick="calculateFeedTimes()">Log Feeding</button>

        <div class="results" id="results"></div>
    </div>

    <div class="footer">
        Calm. Simple. On schedule.
    </div>
</div>

<script>
function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
    });
}

function calculateFeedTimes() {
    const now = new Date();
    const resultsDiv = document.getElementById("results");

    const intervals = [1, 2, 3, 4, 5];

    let html = "";

    intervals.forEach(hour => {
        const next = new Date(now.getTime() + hour * 60 * 60 * 1000);

        html += `
            <div class="result-item">
                <span>${hour} hour${hour > 1 ? "s" : ""}</span>
                <span class="time">${formatTime(next)}</span>
            </div>
        `;
    });

    resultsDiv.innerHTML = html;
}
</script>

</body>
</html>
