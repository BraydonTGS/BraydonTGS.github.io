<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --primary: #7a8f7b;
    --secondary: #a3b18a;
    --text: #3a3a3a;
    --muted: #7d7d7d;
}

body.dark {
    --bg: #1f2a24;
    --card: #2c3a33;
    --primary: #a3b18a;
    --secondary: #7a8f7b;
    --text: #f1f1f1;
    --muted: #cfcfcf;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.top-actions {
    position: fixed;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 1000;
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    margin: 80px auto 20px;
}

h1 { margin-bottom: 10px; }
p { color: var(--muted); }

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

button.main {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button.main:hover { background: var(--secondary); }
button.main:active { transform: scale(0.97); }

.results {
    margin-top: 16px;
    text-align: left;
}

.result-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
}

.result-item.selected {
    background: var(--primary);
    color: white;
}
</style>
</head>
<body>

<div class="top-actions">
    <button class="icon-btn" onclick="clearAll()">🔄</button>
    <button class="icon-btn" id="notifBtn" onclick="requestNotif()">🔕</button>
    <button class="icon-btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
</div>

<div class="container">
    <h1>🌿 Next Feed</h1>
    <p>Tap once. Stay simple.</p>

    <div class="card">
        <button class="main" onclick="logFeeding()">Log Feeding</button>
        <div class="results" id="results"></div>
    </div>
</div>

<script>
const intervals = [1,1.5,2,2.5,3,3.5,4,4.5,5];
let notifTimeout;

// ✅ Always return a default interval if not set
function getDefaultInterval() {
    return parseFloat(localStorage.getItem("defaultInterval")) || 1;
}

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: undefined });
}

function logFeeding() {
    const now = new Date();
    localStorage.setItem("lastFed", now);

    renderResults(now);
    scheduleNotification(now);
}

// ✅ Render results with "Now" first and highlight default interval
function renderResults(baseTime) {
    const resultsDiv = document.getElementById("results");
    const defaultInterval = getDefaultInterval();

    resultsDiv.innerHTML = "";

    // "Now" row
    const nowDiv = document.createElement("div");
    nowDiv.className = "result-item";
    nowDiv.innerHTML = `<span>Last Fed</span><span>${formatTime(baseTime)}</span>`;
    resultsDiv.appendChild(nowDiv);

    intervals.forEach(hour => {
        const next = new Date(baseTime.getTime() + hour * 3600000);
        const div = document.createElement("div");

        div.className = "result-item";
        if (hour === defaultInterval) div.classList.add("selected");

        div.innerHTML = `<span>${hour} hr</span><span>${formatTime(next)}</span>`;
        div.onclick = () => setDefault(hour);

        resultsDiv.appendChild(div);
    });
}

// ✅ Set default interval and refresh results
function setDefault(hour) {
    localStorage.setItem("defaultInterval", hour);
    const lastFed = localStorage.getItem("lastFed");
    if (lastFed) {
        renderResults(new Date(lastFed));
        scheduleNotification(new Date(lastFed));
    }
}

// ✅ Notification icon handling
function updateNotifIcon() {
    const btn = document.getElementById("notifBtn");
    btn.innerText = Notification.permission === "granted" ? "🔔" : "🔕";
}

function requestNotif() {
    if (Notification.permission === "default") {
        Notification.requestPermission().then(updateNotifIcon);
    } else {
        updateNotifIcon();
    }
}

// ✅ Schedule notification 15 minutes before next feed
function scheduleNotification(baseTime) {
    clearTimeout(notifTimeout);
    const interval = getDefaultInterval();
    if (!interval) return;

    if (Notification.permission !== "granted") {
        Notification.requestPermission().then(updateNotifIcon);
        return;
    }

    const nextFeed = new Date(baseTime.getTime() + interval * 3600000);
    const notifyTime = new Date(nextFeed.getTime() - 15 * 60000); // 15 min before
    const delay = notifyTime - new Date();

    if (delay <= 0) return; // already passed

    notifTimeout = setTimeout(() => {
        new Notification("🌿 Time to feed in 15 minutes!");
    }, delay);
}

function clearAll() {
    localStorage.removeItem("lastFed"); // keep default interval
    document.getElementById("results").innerHTML = "";
    clearTimeout(notifTimeout);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
}

function init() {
    const lastFed = localStorage.getItem("lastFed");

    if (lastFed) {
        renderResults(new Date(lastFed));
        scheduleNotification(new Date(lastFed));
    }

    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }

    document.getElementById("themeBtn").innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
    updateNotifIcon();
}

init();
</script>

</body>
</html>
